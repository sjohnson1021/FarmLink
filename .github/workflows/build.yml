name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Build
      # Release config triggers Pathoschild.Stardew.ModBuildConfig to create a zip in 'releases/'
      run: dotnet build --configuration Release

    - name: Prepare Artifact
      run: |
        # Find the generated zip (e.g., "FarmLink 1.0.0.zip") and rename it
        find releases -name "*.zip" -print0 | xargs -0 -I {} mv {} FarmLink.zip
        ls -l FarmLink.zip

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: latest
        name: Latest Build
        body: |
          **Latest Commit:** ${{ github.event.head_commit.message }}
          
          *Automated build from commit ${{ github.sha }}*
        files: FarmLink.zip
        prerelease: true
